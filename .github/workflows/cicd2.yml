name: CI Pipeline2

#<------------------------(2-Improved)----------------------->
on:
 workflow_dispatch:
   inputs:
     environment:
       default: dev
       description: choose environments
       required: true
       type: choice
       options:
         - low_env
         - dev
         - uat
         - prod
     artifact_tags:
       description: Please Maintain Artifacts for references.
       default: "0.0.0_None"
       required: true
#<------------------------(2-Improved)----------------------->

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
#<---------------------(1-Improved)-------------------------->

      - name: Custom_message(1_IMPROVED)
        run: |
          echo "Deployed at ${{ inputs.environment }}" 
          
#<-------------------(1-Improved)---------------------------->


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
#<-------------------Adding Caching--------------------------->
          
      - name: Acahe PIP Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-


      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run App
        run: python app.py
