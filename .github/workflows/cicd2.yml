name: CI Pipeline2

################################### (2)
  
on:
 workflow_dispatch:
   inputs:
     environment:
       default: dev
       description: choose environments
       required: true
       type: choice
       options:
         - low_env
         - dev
         - uat
         - prod
#####################################

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Custom_message(1)
        run: |
          echo "Deployed at ${{ inputs.environment }}"    #<-------(1)


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run App
        run: python app.py
